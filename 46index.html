<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes App Pro</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#0f172a;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:750px;
    background:#1e293b;
    padding:25px;
    border-radius:22px;
    color:white;
    box-shadow:0 0 25px rgba(0,0,0,0.4);
}

.top{
    display:flex;
    gap:12px;
}

input{
    flex:1;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#334155;
    color:white;
    outline:none;
    font-size:16px;
}

button{
    padding:15px 20px;
    border:none;
    border-radius:12px;
    background:#22c55e;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

.notes{
    margin-top:25px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

.note{
    background:#334155;
    padding:18px;
    border-radius:14px;
    position:relative;
    word-wrap:break-word;
    min-height:120px;
}

.note p{
    margin-top:10px;
    line-height:1.7;
}

.delete{
    position:absolute;
    top:12px;
    right:12px;
    background:#ef4444;
    border:none;
    padding:7px 10px;
    border-radius:8px;
    cursor:pointer;
}

.date{
    margin-top:15px;
    font-size:13px;
    opacity:0.7;
}

</style>
</head>

<body>

<div class="container">

    <h2>📝 Notes App Pro</h2>

    <br>

    <div class="top">

        <input
        type="text"
        id="noteInput"
        placeholder="Yangi note yozing...">

        <button onclick="addNote()">
            Add
        </button>

    </div>

    <div class="notes" id="notes"></div>

</div>

<script>

let notes = [];

function addNote(){

    let input =
    document.getElementById("noteInput");

    let text =
    input.value;

    if(text.trim() === "") return;

    let now =
    new Date();

    notes.unshift({
        text:text,
        date:now.toLocaleString()
    });

    renderNotes();

    input.value = "";
}

function renderNotes(){

    let notesBox =
    document.getElementById("notes");

    notesBox.innerHTML = "";

    notes.forEach((note,index) => {

        notesBox.innerHTML += `
        
            <div class="note">

                <button
                class="delete"
                onclick="deleteNote(${index})">
                X
                </button>

                <h3>Note</h3>

                <p>${note.text}</p>

                <div class="date">
                    ${note.date}
                </div>

            </div>

        `;
    });
}

function deleteNote(index){

    notes.splice(index,1);

    renderNotes();
}

</script>

</body>
</html>
